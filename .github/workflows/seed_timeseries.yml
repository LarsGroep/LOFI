name: Seed Chartmetric Timeseries

# Fetches 180-day timeseries for ALL artists with a CM ID (not just lofi_booked).
# Computes ml_features: sp_30d_pct, sp_90d_pct, sp_180d_pct, sp_accel,
# sp_l2f, ig/tk/yt growth percentages.
# Scheduled at 8:00 AM UTC — after Build Booked Profiles finishes (~7:30 AM).
# Resumable: skips artists that already have cm_timeseries.

on:
  schedule:
    - cron: '0 8 * * *'   # 8:00 AM UTC — runs after Build Booked Profiles (~3.5 hrs)
  workflow_dispatch:
    inputs:
      days:
        description: 'Days of history to fetch (default 180)'
        required: false
        default: '180'
      force:
        description: 'Re-fetch even if timeseries already exists'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      limit:
        description: 'Max artists to process (0 = all)'
        required: false
        default: '0'

jobs:
  timeseries:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Fetch Chartmetric timeseries for all artists
        env:
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:               ${{ secrets.SUPABASE_KEY }}
          CHARTMETRIC_REFRESH_TOKEN:  ${{ secrets.CHARTMETRIC_REFRESH_TOKEN }}
        run: |
          ARGS="--days ${{ github.event.inputs.days || '180' }} --all-artists"
          if [ "${{ github.event.inputs.force || 'false' }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          if [ "${{ github.event.inputs.limit || '0' }}" != "0" ]; then
            ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          fi
          python seed_timeseries.py $ARGS
