name: "[LD] Traxsource Charts"
on:
  schedule:
    - cron: "0 8 * * 1"   # every Monday 08:00 UTC
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scrapers/live_detection/charts/traxsource/requirements.txt
      - run: pip install -r scrapers/live_detection/charts/traxsource/requirements.txt
      - name: Scrape Traxsource Top 100
        working-directory: scrapers/live_detection/charts/traxsource
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper.py
