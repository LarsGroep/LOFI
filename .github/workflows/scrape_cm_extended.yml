name: Scrape CM Extended

# Runs after the core scrape_flagged pipeline.
# Tries all available CM endpoints per artist (~21 returning data after cleanup).
# At 1.2s/req x 21 endpoints = ~25s/artist, 20 batches of 20 = ~400 artists per run (~140 min).
# Self-chains until queue is empty so the full roster is covered in one night.
# All plan-restricted endpoints are logged in endpoint_log and retried nightly.

on:
  schedule:
    - cron: '30 3 * * *'   # 03:30 UTC -- 3.5 hours after scrape_flagged (00:00)
  workflow_dispatch:
    inputs:
      artist_id:
        description: 'Single artist UUID (leave blank for batch)'
        required: false
        default: ''
      limit:
        description: 'Artists per batch'
        required: false
        default: '20'
      batches:
        description: 'Max batches per run (chains automatically if queue not empty)'
        required: false
        default: '20'
      dry_run:
        description: 'Print only, do not write to DB (true/false)'
        required: false
        default: 'false'
      probe:
        description: 'Probe first artist only to see which endpoints return data (true/false)'
        required: false
        default: 'false'
      no_chain:
        description: 'Do not trigger a follow-up run when queue is not empty (true/false)'
        required: false
        default: 'false'

permissions:
  actions: write
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 220

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Scrape extended CM data
        id: scrape
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:              ${{ secrets.SUPABASE_KEY }}
          CHARTMETRIC_REFRESH_TOKEN: ${{ secrets.CHARTMETRIC_REFRESH_TOKEN }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.artist_id }}" ]; then
            ARGS="--artist-id ${{ github.event.inputs.artist_id }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ github.event.inputs.probe }}" = "true" ]; then
            ARGS="$ARGS --probe"
          fi
          LIMIT="${{ github.event.inputs.limit || '20' }}"
          MAX_BATCHES="${{ github.event.inputs.batches || '20' }}"
          QUEUE_EMPTY=false
          for i in $(seq 1 $MAX_BATCHES); do
            echo "=== Batch $i / $MAX_BATCHES ==="
            OUTPUT=$(python -u scrapers/scrape_cm_extended.py --limit "$LIMIT" $ARGS 2>&1)
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "Nothing to scrape"; then
              echo "All done -- stopping."
              QUEUE_EMPTY=true
              break
            fi
          done
          echo "queue_empty=$QUEUE_EMPTY" >> $GITHUB_OUTPUT

      - name: Chain next run if queue not empty
        if: |
          steps.scrape.outputs.queue_empty != 'true' &&
          github.event.inputs.artist_id == '' &&
          github.event.inputs.dry_run != 'true' &&
          github.event.inputs.probe != 'true' &&
          github.event.inputs.no_chain != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Queue not empty — chaining next scrape_cm_extended run"
          gh workflow run scrape_cm_extended.yml \
            --repo "${{ github.repository }}" \
            --field limit="${{ github.event.inputs.limit || '20' }}" \
            --field batches="${{ github.event.inputs.batches || '20' }}"
