name: Scrape CM Extended

# Runs after the core scrape_flagged pipeline.
# Tries all available CM endpoints per artist (20 returning data, 4 plan-restricted).
# Loops in batches of 20 until all artists are processed (unprocessed first).
# At 1.2s/req x 24 endpoints = ~28s/artist, 350-min timeout handles ~700 artists
# in a single run -- enough to clear the full backlog in one night.
# All plan-restricted endpoints are logged in endpoint_log and retried nightly.

on:
  schedule:
    - cron: '30 3 * * *'   # 03:30 UTC -- 3.5 hours after scrape_flagged (00:00)
  workflow_dispatch:
    inputs:
      artist_id:
        description: 'Single artist UUID (leave blank for batch)'
        required: false
        default: ''
      limit:
        description: 'Artists per batch'
        required: false
        default: '20'
      batches:
        description: 'Max batches to run (0 = unlimited until done)'
        required: false
        default: '40'
      dry_run:
        description: 'Print only, do not write to DB (true/false)'
        required: false
        default: 'false'
      probe:
        description: 'Probe first artist only to see which endpoints return data (true/false)'
        required: false
        default: 'false'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Scrape extended CM data
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:              ${{ secrets.SUPABASE_KEY }}
          CHARTMETRIC_REFRESH_TOKEN: ${{ secrets.CHARTMETRIC_REFRESH_TOKEN }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.artist_id }}" ]; then
            ARGS="--artist-id ${{ github.event.inputs.artist_id }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ github.event.inputs.probe }}" = "true" ]; then
            ARGS="$ARGS --probe"
          fi
          LIMIT="${{ github.event.inputs.limit || '20' }}"
          MAX_BATCHES="${{ github.event.inputs.batches || '40' }}"
          for i in $(seq 1 $MAX_BATCHES); do
            echo "=== Batch $i / $MAX_BATCHES ==="
            OUTPUT=$(python -u scrapers/scrape_cm_extended.py --limit "$LIMIT" $ARGS 2>&1)
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "Nothing to scrape"; then echo "All done -- stopping."; break; fi
          done
