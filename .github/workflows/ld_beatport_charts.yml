name: "[LD] Beatport Charts"
on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scrapers/live_detection/charts/beatport/requirements.txt
      - run: pip install -r scrapers/live_detection/charts/beatport/requirements.txt
      - name: Scrape Beatport Top 100
        working-directory: scrapers/live_detection/charts/beatport
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper.py
