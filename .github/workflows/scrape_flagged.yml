name: Scrape Flagged Artists

# Nightly pipeline order:
#   22:00  queue_similar  — adds candidates + updates reference counts
#   23:00  score_artists  — scores + auto-promotes (score >= 60 → accepted + needs_scraping)
#   00:00  scrape_flagged — comprehensive CM timeseries for all needs_scraping artists
#
# Timeseries per artist: spotify(3) + instagram + tiktok(2) + yt_channel(2)
#                        + yt_artist(2) + soundcloud + cpp(2) = 13 API calls ≈ 30s/artist
# At 30s/artist x 50/batch = 25 min/batch. 8 batches = ~200 min, safe under 4h limit.
# Self-chains until queue is empty so the full roster is covered in one night.

on:
  schedule:
    - cron: '0 0 * * *'   # 12:00 AM UTC — after score_artists promotes candidates
  workflow_dispatch:
    inputs:
      limit:
        description: 'Artists per batch'
        required: false
        default: '50'
      batches:
        description: 'Max batches per run (chains automatically if queue not empty)'
        required: false
        default: '8'
      days:
        description: 'Timeseries lookback in days (default 365)'
        required: false
        default: '365'

permissions:
  actions: write
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 220

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Scrape flagged artists
        id: scrape
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:              ${{ secrets.SUPABASE_KEY }}
          CHARTMETRIC_REFRESH_TOKEN: ${{ secrets.CHARTMETRIC_REFRESH_TOKEN }}
        run: |
          LIMIT="${{ github.event.inputs.limit || '50' }}"
          DAYS="${{ github.event.inputs.days || '365' }}"
          MAX_BATCHES="${{ github.event.inputs.batches || '8' }}"
          QUEUE_EMPTY=false
          for i in $(seq 1 $MAX_BATCHES); do
            echo "=== Batch $i / $MAX_BATCHES ==="
            OUTPUT=$(python -u scrapers/scrape_flagged.py --limit "$LIMIT" --days "$DAYS" 2>&1)
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "Nothing flagged"; then
              echo "Queue empty — stopping."
              QUEUE_EMPTY=true
              break
            fi
          done
          echo "queue_empty=$QUEUE_EMPTY" >> $GITHUB_OUTPUT

      - name: Chain next run if artists remain
        if: steps.scrape.outputs.queue_empty != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Artists still in queue — chaining next scrape_flagged run"
          gh workflow run scrape_flagged.yml \
            --repo "${{ github.repository }}" \
            --field limit="${{ github.event.inputs.limit || '50' }}" \
            --field batches="${{ github.event.inputs.batches || '8' }}" \
            --field days="${{ github.event.inputs.days || '365' }}"
