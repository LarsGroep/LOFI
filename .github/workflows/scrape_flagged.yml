name: Scrape Flagged Artists

# Nightly pipeline order:
#   02:00  queue_similar  — adds candidates + updates reference counts
#   03:00  score_artists  — scores + auto-promotes (score >= 60 → accepted + needs_scraping)
#   04:00  scrape_flagged — comprehensive CM timeseries for all needs_scraping artists
#
# Timeseries per artist: spotify(3) + instagram + tiktok(2) + yt_channel(2)
#                        + yt_artist(2) + soundcloud + cpp(2) = 13 API calls ≈ 30s/artist

on:
  schedule:
    - cron: '0 4 * * *'   # 4:00 AM UTC — after score_artists promotes candidates
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max artists to scrape (0 = all)'
        required: false
        default: '0'
      days:
        description: 'Timeseries lookback in days (default 365)'
        required: false
        default: '365'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Scrape flagged artists
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:              ${{ secrets.SUPABASE_KEY }}
          CHARTMETRIC_REFRESH_TOKEN: ${{ secrets.CHARTMETRIC_REFRESH_TOKEN }}
        run: |
          python scrapers/scrape_flagged.py \
            --limit "${{ github.event.inputs.limit || '0' }}" \
            --days  "${{ github.event.inputs.days  || '365' }}"
