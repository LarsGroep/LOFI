name: "[LD] RA Podcast"
on:
  schedule:
    - cron: "0 8 * * *"   # daily at 08:00 UTC
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scrapers/live_detection/ra_podcast/requirements.txt
      - run: pip install -r scrapers/live_detection/ra_podcast/requirements.txt
      - name: Scrape RA Podcast listing
        working-directory: scrapers/live_detection/ra_podcast
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper.py
