name: Queue Similar Artists

# Runs nightly — discovers candidates via CM similar-artists per booked artist.
# neighboring-artists is disabled by default: CM matches by career-stage score,
# not genre, so it returns irrelevant artists (0% genre pass rate in testing).
# Reference counts (booked_similar_count) are updated for existing artists.

on:
  schedule:
    - cron: '0 22 * * *'  # 10:00 PM UTC nightly (before score_artists at 23:00)
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max new candidates per batch (0 = unlimited)'
        required: false
        default: '100'
      batches:
        description: 'Max batches to run (0 = unlimited until no new artists)'
        required: false
        default: '10'
      per_artist:
        description: 'Candidates per booked artist (similar-artists depth)'
        required: false
        default: '30'
      no_neighbors:
        description: 'Skip neighboring-artists endpoint (true/false)'
        required: false
        default: 'true'
      score_threshold:
        description: 'Min taxonomy score to add a similar artist (0 = no filter)'
        required: false
        default: '40'

jobs:
  queue:
    runs-on: ubuntu-latest
    timeout-minutes: 200

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Queue similar + neighbouring artists
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:              ${{ secrets.SUPABASE_KEY }}
          CHARTMETRIC_REFRESH_TOKEN: ${{ secrets.CHARTMETRIC_REFRESH_TOKEN }}
        run: |
          NO_NBR=""
          if [ "${{ github.event.inputs.no_neighbors }}" = "true" ]; then
            NO_NBR="--no-neighbors"
          fi
          LIMIT="${{ github.event.inputs.limit || '100' }}"
          MAX_BATCHES="${{ github.event.inputs.batches || '10' }}"
          for i in $(seq 1 $MAX_BATCHES); do
            echo "=== Batch $i / $MAX_BATCHES ==="
            OUTPUT=$(python -u scrapers/queue_similar_artists.py \
              --limit "$LIMIT" \
              --per-artist ${{ github.event.inputs.per_artist || '30' }} \
              --score-threshold ${{ github.event.inputs.score_threshold || '40' }} \
              $NO_NBR 2>&1)
            echo "$OUTPUT"
            echo "$OUTPUT" | grep -q "0 new candidates queued" && echo "No new artists — stopping." && break
          done
