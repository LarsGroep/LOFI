name: Build LOFI Booked Profiles

# Full Chartmetric enrichment for all lofi_booked artists:
# profile text, image, genres, 180-day timeseries, ml_features.
# Scheduled at 4:00 AM UTC — after Add Booked Artists (1 AM) and
# Scrape Artists (2 AM) have completed.
# Runtime: ~3.5 hrs for 755 artists. Resumable — already-enriched artists skipped.

on:
  schedule:
    - cron: '0 4 * * *'   # 4:00 AM UTC — runs after scrape batch finishes
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Max artists per run (0 = all ~755, ~3.5 hrs)'
        required: false
        default: '0'
      no_timeseries:
        description: 'Skip 180-day time-series (faster, no ML features)'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip + sentence-transformers model
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/torch
            ~/.cache/huggingface
          key: ${{ runner.os }}-lofi-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-lofi-

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Build booked artist profiles + rebuild Feel Matrix
        env:
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:               ${{ secrets.SUPABASE_KEY }}
          CHARTMETRIC_REFRESH_TOKEN:  ${{ secrets.CHARTMETRIC_REFRESH_TOKEN }}
        run: |
          ARGS="--batch-size ${{ github.event.inputs.batch_size || '0' }}"
          if [ "${{ github.event.inputs.no_timeseries || 'false' }}" = "true" ]; then
            ARGS="$ARGS --no-timeseries"
          fi
          python scrapers/build_booked_profiles.py $ARGS
