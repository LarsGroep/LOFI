name: Build LOFI Booked Profiles

# Overnight job: profile all artists from lofi_booked_labels.csv with full
# Chartmetric enrichment — profile text, embedding, 180-day time-series,
# and pre-computed ML features (growth rates, acceleration, momentum).
# After completion the LOFI Feel Matrix centroid is rebuilt from all
# booked artists and saved to Supabase.
#
# Timing: ~10 Chartmetric API calls/artist × 1.5s each → ~15s/artist
#   755 artists ≈ 3.1 hrs enrichment + 5 min embedding = ~3.5 hrs total
#   Fits in the 6-hour job timeout.
#
# Resumable: already-profiled artists are skipped automatically.
# Add --no-timeseries flag to cut time in half (no ML features).

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Max artists per run (0 = all ~755, ~3.5 hrs)'
        required: false
        default: '0'
      no_timeseries:
        description: 'Skip 180-day time-series (faster, no ML features)'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip + sentence-transformers model
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/torch
            ~/.cache/huggingface
          key: ${{ runner.os }}-lofi-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-lofi-

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Build booked artist profiles + rebuild Feel Matrix
        env:
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:               ${{ secrets.SUPABASE_KEY }}
          CHARTMETRIC_REFRESH_TOKEN:  ${{ secrets.CHARTMETRIC_REFRESH_TOKEN }}
        run: |
          ARGS="--batch-size ${{ github.event.inputs.batch_size || '0' }}"
          if [ "${{ github.event.inputs.no_timeseries }}" = "true" ]; then
            ARGS="$ARGS --no-timeseries"
          fi
          python scrapers/build_booked_profiles.py $ARGS
