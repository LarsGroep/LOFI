name: Scrape Artists

on:
  schedule:
    - cron: '0 3 * * *'   # 3 AM UTC daily
  workflow_dispatch:        # manual trigger from GitHub UI
    inputs:
      batch_size:
        description: 'Number of artists to scrape (0 = all)'
        required: false
        default: '0'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Run scraper
        env:
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:               ${{ secrets.SUPABASE_KEY }}
          LASTFM_API_KEY:             ${{ secrets.LASTFM_API_KEY }}
          DISCOGS_KEY:                ${{ secrets.DISCOGS_KEY }}
          DISCOGS_SECRET:             ${{ secrets.DISCOGS_SECRET }}
          YOUTUBE_API_KEY:            ${{ secrets.YOUTUBE_API_KEY }}
          CHARTMETRIC_CLIENT_ID:      ${{ secrets.CHARTMETRIC_CLIENT_ID }}
          CHARTMETRIC_CLIENT_SECRET:  ${{ secrets.CHARTMETRIC_CLIENT_SECRET }}
          BATCH_SIZE:                 ${{ github.event.inputs.batch_size || '0' }}
        run: python scrapers/github_actions_scrape.py
