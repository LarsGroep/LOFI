name: Scrape Artists

on:
  schedule:
    - cron: '0 3 * * *'   # 3 AM UTC — nightly full batch
    - cron: '0 * * * *'   # every hour — enrich YES'd artists
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode: "batch" (nightly) or "enrich" (YES artists)'
        required: false
        default: 'batch'
      batch_size:
        description: 'Batch mode only: max artists to scrape (0 = all)'
        required: false
        default: '0'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Run nightly batch scrape
        if: github.event.schedule == '0 3 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode != 'enrich')
        env:
          SUPABASE_URL:                ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:                ${{ secrets.SUPABASE_KEY }}
          LASTFM_API_KEY:              ${{ secrets.LASTFM_API_KEY }}
          DISCOGS_KEY:                 ${{ secrets.DISCOGS_KEY }}
          DISCOGS_SECRET:              ${{ secrets.DISCOGS_SECRET }}
          YOUTUBE_API_KEY:             ${{ secrets.YOUTUBE_API_KEY }}
          CHARTMETRIC_REFRESH_TOKEN:   ${{ secrets.CHARTMETRIC_REFRESH_TOKEN }}
          BATCH_SIZE:                  ${{ github.event.inputs.batch_size || '0' }}
        run: python scrapers/github_actions_scrape.py

      - name: Run hourly YES-artist enrichment
        if: github.event.schedule == '0 * * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'enrich')
        env:
          SUPABASE_URL:                ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:                ${{ secrets.SUPABASE_KEY }}
          LASTFM_API_KEY:              ${{ secrets.LASTFM_API_KEY }}
          DISCOGS_KEY:                 ${{ secrets.DISCOGS_KEY }}
          DISCOGS_SECRET:              ${{ secrets.DISCOGS_SECRET }}
          YOUTUBE_API_KEY:             ${{ secrets.YOUTUBE_API_KEY }}
          CHARTMETRIC_REFRESH_TOKEN:   ${{ secrets.CHARTMETRIC_REFRESH_TOKEN }}
        run: python scrapers/github_actions_scrape.py --enrich
