name: Scrape Partyflock

# One-time full scrape of Partyflock profiles + event archives for all artists.
# At ~3s/artist (2 requests × 1.5s) × 50/batch = ~2.5 min/batch.
# 4 batches × ~2.5 min = ~10 min/run. Self-chains until all 912 artists are done.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Artists per batch'
        required: false
        default: '50'
      batches:
        description: 'Max batches per run'
        required: false
        default: '4'
      artist_id:
        description: 'Single artist UUID (leave blank for batch)'
        required: false
        default: ''
      dry_run:
        description: 'Print only, do not write to DB (true/false)'
        required: false
        default: 'false'
      no_chain:
        description: 'Do not trigger a follow-up run when queue not empty (true/false)'
        required: false
        default: 'false'

permissions:
  actions: write
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Scrape Partyflock
        id: scrape
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.artist_id }}" ]; then
            ARGS="--artist-id ${{ github.event.inputs.artist_id }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          LIMIT="${{ github.event.inputs.limit || '50' }}"
          MAX_BATCHES="${{ github.event.inputs.batches || '4' }}"
          QUEUE_EMPTY=false
          for i in $(seq 1 $MAX_BATCHES); do
            echo "=== Batch $i / $MAX_BATCHES ==="
            OUTPUT=$(python -u scrapers/scrape_partyflock.py --limit "$LIMIT" $ARGS 2>&1)
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "Nothing to scrape"; then
              echo "Queue empty -- stopping."
              QUEUE_EMPTY=true
              break
            fi
          done
          echo "queue_empty=$QUEUE_EMPTY" >> $GITHUB_OUTPUT

      - name: Chain next run if queue not empty
        if: |
          steps.scrape.outputs.queue_empty != 'true' &&
          github.event.inputs.artist_id == '' &&
          github.event.inputs.dry_run != 'true' &&
          github.event.inputs.no_chain != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Queue not empty — chaining next scrape_partyflock run"
          gh workflow run scrape_partyflock.yml \
            --repo "${{ github.repository }}" \
            --field limit="${{ github.event.inputs.limit || '50' }}" \
            --field batches="${{ github.event.inputs.batches || '4' }}"
