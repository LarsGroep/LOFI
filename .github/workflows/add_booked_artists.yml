name: Add Booked Artists

# Imports LOFI-booked artists from data/lofi_booked_labels.csv into
# tinder.artist_cache with lofi_booked=true. Skips already-imported artists.
# Scheduled nightly at 1:00 AM UTC so it runs before all other jobs.

on:
  schedule:
    - cron: '0 1 * * *'   # 1:00 AM UTC — runs first, before scrape and timeseries
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Artists to process per run (0 = all, default 50)'
        required: false
        default: '50'
      dry_run:
        description: 'Dry run — print what would be imported without writing'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  add-booked:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Import LOFI-booked artists
        env:
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:               ${{ secrets.SUPABASE_KEY }}
          LASTFM_API_KEY:             ${{ secrets.LASTFM_API_KEY }}
          DISCOGS_KEY:                ${{ secrets.DISCOGS_KEY }}
          DISCOGS_SECRET:             ${{ secrets.DISCOGS_SECRET }}
          YOUTUBE_API_KEY:            ${{ secrets.YOUTUBE_API_KEY }}
          CHARTMETRIC_REFRESH_TOKEN:  ${{ secrets.CHARTMETRIC_REFRESH_TOKEN }}
        run: |
          DRY=${{ github.event.inputs.dry_run || 'false' }}
          BS=${{ github.event.inputs.batch_size || '0' }}
          ARGS="--batch-size ${BS}"
          if [ "$DRY" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python scrapers/add_booked_artists.py $ARGS
