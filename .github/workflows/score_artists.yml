name: Score LOFI Feel

# Nightly pipeline (no LLM — taxonomy + embedding + neighboring network):
#   02:00  queue_similar  — adds candidates, updates reference counts
#   03:00  scrape_flagged — enriches accepted artists
#   03:30  score_artists  — scores pending artists using updated counts

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:
    inputs:
      status:
        description: 'Which artists to score: pending | accepted | all'
        required: false
        default: 'pending'
      limit:
        description: 'Max artists (0 = all matching)'
        required: false
        default: '0'

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Score artists
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python scoring/lofi_scorer.py \
            --status "${{ github.event.inputs.status || 'pending' }}" \
            --limit "${{ github.event.inputs.limit || '0' }}"
