name: Score LOFI Feel

# Nightly pipeline order:
#   22:00  queue_similar  — adds candidates, updates reference counts
#   23:00  score_artists  — scores pending artists, auto-promotes score >= threshold
#   00:00  scrape_flagged — full timeseries for auto-promoted (accepted) artists

on:
  schedule:
    - cron: '0 19 * * *'  # 19:00 UTC (21:00 CEST)
  workflow_dispatch:
    inputs:
      status:
        description: 'Which artists to score: pending | accepted | all'
        required: false
        default: 'pending'
      limit:
        description: 'Max artists (0 = all matching)'
        required: false
        default: '0'
      threshold:
        description: 'Auto-promote threshold 0-100 (0 = use taxonomy YAML default of 60)'
        required: false
        default: '0'
      no_autopromote:
        description: 'Skip auto-promotion (true/false)'
        required: false
        default: 'false'

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Score artists + auto-promote
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          NO_AP=""
          if [ "${{ github.event.inputs.no_autopromote }}" = "true" ]; then
            NO_AP="--no-autopromote"
          fi
          python scoring/lofi_scorer.py \
            --status "${{ github.event.inputs.status || 'pending' }}" \
            --limit  "${{ github.event.inputs.limit || '0' }}" \
            --threshold "${{ github.event.inputs.threshold || '0' }}" \
            $NO_AP
