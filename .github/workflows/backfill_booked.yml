name: Backfill Booked Artists

# Fills missing Chartmetric profile data for LOFI-booked artists.
# Run manually whenever booked artists are added or after initial setup.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max artists to process (0 = all missing)'
        required: false
        default: '0'
      force:
        description: 'Re-fetch even if data already exists (true/false)'
        required: false
        default: 'false'

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Check Supabase key role
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python - <<'PY'
          import os, base64, json

          key = os.environ.get("SUPABASE_KEY", "")
          assert key, "SUPABASE_KEY missing"

          parts = key.split(".")
          assert len(parts) >= 2, "SUPABASE_KEY does not look like a JWT"

          payload = parts[1] + "=" * (-len(parts[1]) % 4)
          data = json.loads(base64.urlsafe_b64decode(payload))
          print("Supabase JWT role:", data.get("role"))
          print("Supabase JWT issuer:", data.get("iss"))
          PY

      - name: Check secrets are present
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:              ${{ secrets.SUPABASE_KEY }}
          CHARTMETRIC_REFRESH_TOKEN: ${{ secrets.CHARTMETRIC_REFRESH_TOKEN }}
        run: |
          test -n "$SUPABASE_URL" || (echo "SUPABASE_URL missing" && exit 1)
          test -n "$SUPABASE_KEY" || (echo "SUPABASE_KEY missing" && exit 1)
          test -n "$CHARTMETRIC_REFRESH_TOKEN" || (echo "CHARTMETRIC_REFRESH_TOKEN missing" && exit 1)
          echo "Secrets are present"

      - name: Backfill booked artist profiles
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:              ${{ secrets.SUPABASE_KEY }}
          CHARTMETRIC_REFRESH_TOKEN: ${{ secrets.CHARTMETRIC_REFRESH_TOKEN }}
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python scrapers/backfill_booked.py \
            --limit ${{ github.event.inputs.limit || '0' }} \
            $FORCE_FLAG
